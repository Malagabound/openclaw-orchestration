name: file_read
description: Read the contents of a file at the given path and return its content with encoding information.
version: "1.0.0"

parameters:
  path:
    type: string
    description: Absolute or relative path to the file to read
    required: true

returns:
  content:
    type: string
    description: The text content of the file
  encoding:
    type: string
    description: The detected encoding of the file (e.g., utf-8, ascii, latin-1)

execution:
  type: python
  module: tools.executors.file_read
  function: execute

idempotent: true
destructive: false
timeout_seconds: 30

test:
  input:
    path: "/tmp/test_file_read.txt"
  expected:
    has_fields:
      - content
      - encoding
